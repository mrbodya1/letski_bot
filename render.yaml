services:
  - type: web
    name: letski-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn flask_app:app
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: MAIN_CHAT_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEBHOOK_HOST
        sync: false
